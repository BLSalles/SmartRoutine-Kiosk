services:
  - type: web
    name: smartroutine-kiosk
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PIN_COZINHA
        value: "1234"
      - key: PIN_DONO
        value: "9999"
      - key: DATABASE_URL
        fromDatabase:
          name: smartroutine-kiosk-db
          property: connectionString

databases:
  - name: smartroutine-kiosk-db
    plan: free
