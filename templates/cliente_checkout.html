{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card card-panel shadow-soft">
      <div class="card-body p-4 p-lg-5">
        <h2 class="fw-black mb-1">Checkout</h2>
        <p class="text-white-60 mb-4">Informe seus dados para identificação do pedido.</p>

        <form method="post" class="vstack gap-3">
          <div>
            <label class="form-label">Seu nome</label>
            <input class="form-control form-control-lg" name="customer_name" required placeholder="Ex.: Bruno">
          </div>

          <div>
            <label class="form-label">CPF (obrigatório)</label>
            <input id="cpfInput" class="form-control form-control-lg" name="customer_cpf" required
                   placeholder="000.000.000-00" inputmode="numeric" maxlength="14">
            <div class="form-text text-white-60">
              Você usará este CPF para consultar e acompanhar o pedido.
            </div>
          </div>

          <div>
            <label class="form-label">Mesa (opcional)</label>
            <input class="form-control form-control-lg" name="table_number" placeholder="Ex.: 12">
          </div>

          <div class="d-flex justify-content-between align-items-center mt-2">
            <div class="fs-5 text-white-60">Total</div>
            <div class="fs-3 fw-black text-white">R$ {{ "%.2f"|format(total) }}</div>
          </div>

          <button class="btn btn-sr btn-lg mt-2" type="submit">
            <i class="bi bi-send me-1"></i>Enviar pedido
          </button>
          <a class="btn btn-ghost" href="{{ url_for('cliente_carrinho') }}">
            <i class="bi bi-arrow-left me-1"></i>Voltar
          </a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Máscara CPF: 000.000.000-00
  const cpf = document.getElementById('cpfInput');
  if(cpf){
    cpf.addEventListener('input', () => {
      let v = cpf.value.replace(/\D/g,'').slice(0,11);
      if (v.length > 9) cpf.value = v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
      else if (v.length > 6) cpf.value = v.replace(/(\d{3})(\d{3})(\d{0,3})/, '$1.$2.$3');
      else if (v.length > 3) cpf.value = v.replace(/(\d{3})(\d{0,3})/, '$1.$2');
      else cpf.value = v;
    });
  }
</script>
{% endblock %}
