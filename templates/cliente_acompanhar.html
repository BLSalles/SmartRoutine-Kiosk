{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card card-panel shadow-soft">
      <div class="card-body p-4 p-lg-5">
        <div class="d-flex align-items-start justify-content-between mb-2">
          <div class="d-flex align-items-center gap-3">
            <div class="icon-badge"><i class="bi bi-receipt"></i></div>
            <div>
              <h2 class="fw-black mb-0">Acompanhar pedido</h2>
              <div class="text-white-60">Digite seu CPF para ver apenas os seus pedidos.</div>
            </div>
          </div>
          <div class="d-flex gap-2">
            <a class="btn btn-ghost" href="{{ url_for('cliente_menu') }}"><i class="bi bi-arrow-left me-1"></i>Voltar ao menu</a>
            <form method="post" action="{{ url_for('cliente_sair_cpf') }}" class="d-inline">
              <button type="submit" class="btn btn-outline-sr"><i class="bi bi-person-x me-1"></i>Trocar CPF</button>
            </form>
          </div>
        </div>

        <form class="mt-3" method="post" action="{{ url_for('cliente_acompanhar_buscar') }}">
          <div class="row g-2 align-items-end">
            <div class="col-md-8">
              <label class="form-label">CPF</label>
              <input id="cpfSearch" class="form-control form-control-lg" name="customer_cpf"
                     placeholder="000.000.000-00" inputmode="numeric" maxlength="14" required>
            </div>
            <div class="col-md-4 d-grid">
              <button class="btn btn-sr btn-lg" type="submit">Buscar</button>
            </div>
          </div>
          <div class="form-text text-white-60 mt-2">
            Segurança: você só acessa pedidos vinculados ao CPF informado.
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Máscara CPF: 000.000.000-00
  const cpf = document.getElementById('cpfSearch');
  if(cpf){
    cpf.addEventListener('input', () => {
      let v = cpf.value.replace(/\D/g,'').slice(0,11);
      if (v.length > 9) cpf.value = v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
      else if (v.length > 6) cpf.value = v.replace(/(\d{3})(\d{3})(\d{0,3})/, '$1.$2.$3');
      else if (v.length > 3) cpf.value = v.replace(/(\d{3})(\d{0,3})/, '$1.$2');
      else cpf.value = v;
    });
  }
</script>
{% endblock %}
