{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
  <div>
    <h2 class="fw-black mb-0"><i class="bi bi-cash-coin me-2"></i>Despesas</h2>
    <div class="text-white-60">Controle de gastos (lançamentos).</div>
  </div>
  <a class="btn btn-outline-sr" href="{{ url_for('dono_dashboard') }}"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
</div>

<div class="row g-3">
  <div class="col-lg-5">
    <div class="card card-panel shadow-soft">
      <div class="card-body">
        <h5 class="fw-bold mb-3">Nova despesa</h5>
        <form method="post" class="vstack gap-2">
          <div>
            <label class="form-label">Descrição</label>
            <input class="form-control" name="description" placeholder="Ex.: Embalagens" required>
          </div>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label">Data</label>
              <input class="form-control" type="date" name="date">
            </div>
            <div class="col-6">
              <label class="form-label">Valor (R$)</label>
              <input class="form-control" name="amount" placeholder="Ex.: 120,50" required>
            </div>
          </div>
          <button class="btn btn-sr mt-2" type="submit"><i class="bi bi-plus-circle me-1"></i>Salvar</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-lg-7">
    <div class="card card-panel shadow-soft">
      <div class="card-body">
        <h5 class="fw-bold mb-3">Últimos lançamentos</h5>
        <div class="table-responsive">
          <table class="table table-darkish table-sm align-middle">
            <thead>
              <tr><th>Data</th><th>Descrição</th><th class="text-end">Valor</th></tr>
            </thead>
            <tbody>
              {% for e in items %}
              <tr>
                <td>{{ e.date.strftime("%d/%m/%Y") }}</td>
                <td class="text-white">{{ e.description }}</td>
                <td class="text-end fw-bold text-danger">R$ {{ "%.2f"|format(e.amount) }}</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
